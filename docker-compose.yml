#version: "3.8"

services:
  app_server:
    build: .
    security_opt:
      - seccomp:unconfined
    volumes:
      - .:/syntropy
    ports:
      - "1234:1234"
    stop_signal: SIGINT
    stop_grace_period: 10s
    restart: unless-stopped
    healthcheck:
      test: "curl 'http://localhost:1234/'"
      interval: "30s"
      timeout: "3s"
      start_period: "5s"
      retries: 3
    networks:
      - proxy_network

  console:
    build: .
    command: bundle exec syntropy console
    stdin_open: true # docker run -i
    tty: true
    security_opt:
      - seccomp:unconfined
    profiles:
      - dev
    volumes:
      - .:/syntropy
    stop_signal: SIGINT
    restart: never

  test:
    build: .
    command: bundle exec syntropy test -w
    stdin_open: true # docker run -i
    tty: true
    security_opt:
      - seccomp:unconfined
    profiles:
      - dev
    volumes:
      - .:/syntropy
    stop_signal: SIGINT
    restart: never

  proxy:
    depends_on:
      - app_server
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - ./storage/caddy/data:/data
      - ./storage/caddy/config:/config
    networks:
      - proxy_network

networks:
  proxy_network:
    name: proxy_network
